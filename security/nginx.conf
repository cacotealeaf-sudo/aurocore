# Nginx 安全性配置
# 將此配置添加到你的 nginx.conf 或 site-specific 配置文件中

server {
    listen 80;
    server_name aurocore.com www.aurocore.com;
    
    # 強制重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aurocore.com www.aurocore.com;
    
    root /var/www/aurocore;
    index index.html index.htm;
    
    # ==========================================
    # 1. SSL/TLS 配置
    # ==========================================
    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/private.key;
    
    # 使用現代 TLS 協議
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    
    # SSL Session 快取
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # ==========================================
    # 2. 安全性 Headers
    # ==========================================
    
    # X-Frame-Options: 防止 Clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # X-Content-Type-Options: 防止 MIME 嗅探
    add_header X-Content-Type-Options "nosniff" always;
    
    # X-XSS-Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions-Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Strict-Transport-Security (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content-Security-Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://code.jquery.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com;" always;
    
    # ==========================================
    # 3. 限制請求方法
    # ==========================================
    if ($request_method !~ ^(GET|HEAD|POST)$ ) {
        return 405;
    }
    
    # ==========================================
    # 4. 隱藏 Nginx 版本
    # ==========================================
    server_tokens off;
    
    # ==========================================
    # 5. 限制檔案上傳大小
    # ==========================================
    client_max_body_size 10M;
    
    # ==========================================
    # 6. 設置 Buffer 限制（防止 Buffer Overflow）
    # ==========================================
    client_body_buffer_size 1K;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    
    # ==========================================
    # 7. 超時設定（防止慢速攻擊）
    # ==========================================
    client_body_timeout 10;
    client_header_timeout 10;
    keepalive_timeout 5 5;
    send_timeout 10;
    
    # ==========================================
    # 8. 禁止訪問隱藏文件
    # ==========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ==========================================
    # 9. 保護敏感文件
    # ==========================================
    location ~* \.(htaccess|htpasswd|ini|log|sh|sql|git|env)$ {
        deny all;
    }
    
    # ==========================================
    # 10. GZIP 壓縮
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype image/svg+xml;
    
    # ==========================================
    # 11. 瀏覽器快取
    # ==========================================
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
    }
    
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # ==========================================
    # 12. 限制連線速率（基本 DDoS 防護）
    # ==========================================
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;
    limit_req zone=one burst=20 nodelay;
    
    # ==========================================
    # 13. 防止熱鏈接
    # ==========================================
    location ~* \.(jpg|jpeg|png|gif|svg|webp)$ {
        valid_referers none blocked aurocore.com www.aurocore.com;
        if ($invalid_referer) {
            return 403;
        }
    }
    
    # ==========================================
    # 14. 主要 location 配置
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # ==========================================
    # 15. 錯誤頁面
    # ==========================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    # ==========================================
    # 16. 日誌配置
    # ==========================================
    access_log /var/log/nginx/aurocore_access.log;
    error_log /var/log/nginx/aurocore_error.log;
}
